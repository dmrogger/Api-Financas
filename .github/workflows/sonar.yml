
name: SonarCloud Analysis

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      # Doc oficial: Coverlet → OpenCover + sonar.cs.opencover.reportsPaths (caminho relativo)
      # https://docs.sonarsource.com/sonarqube-cloud/analyzing-source-code/test-coverage/dotnet-test-coverage
      - name: Install coverlet.console
        run: dotnet tool install --global coverlet.console

      # ==========================
      # SONAR BEGIN
      # ==========================
      - name: Sonar Begin
        run: |
          dotnet sonarscanner begin \
            /k:"dmrogger_Api-Financas" \
            /o:"dmrogger" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.cs.opencover.reportsPaths=coverage.xml \
            /d:sonar.exclusions="**/bin/**,**/obj/**,**/*Dto.cs,**/*Request.cs,**/*Response.cs"
            /d:sonar.coverage.exclusions="**/Controllers/**,**/Entities/**,**/Program.cs,**/Configurations/**,**/Migrations/**"
      # ==========================
      # RESTORE
      # ==========================
      - name: Restore
        run: dotnet restore ApiFinancas.sln

      # ==========================
      # BUILD
      # ==========================
      - name: Build
        run: dotnet build ApiFinancas.sln --configuration Release --no-incremental

      # ==========================
      # TEST WITH COVERAGE (Coverlet console → OpenCover)
      # ==========================
      - name: Test with coverage
        run: |
          coverlet "Tests/bin/Release/net8.0/ApiFinancas.Tests.dll" \
            --target dotnet \
            --targetargs "test ApiFinancas.sln --no-build --configuration Release" \
            -f opencover \
            -o coverage.xml

      - name: Verificar relatório OpenCover
        run: |
          ls -la coverage.xml
          head -n 3 coverage.xml
          grep -q "CoverageSession" coverage.xml || (echo "::error::coverage.xml não é OpenCover (Coverlet) esperado" && exit 1)

      # ==========================
      # SONAR END
      # ==========================
      - name: Sonar End
        run: |
          dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
